server:
  port: 8080

spring:
  application:
    name: aml-service
  datasource:
    url: jdbc:h2:mem:amldb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

aml:
  clickhouse:
    jdbc-url: jdbc:clickhouse://localhost:8123/aml
    username: default
    password: ""
    database: aml
  hbase:
    zookeeper-quorum: localhost
    zookeeper-port: 2181
    table-name: aml_customers
  rule-engine:
    rule-store-path: /aml/rules
    refresh-interval-seconds: 60
    ctr-threshold: 10000

logging:
  level:
    com.aml: DEBUG
