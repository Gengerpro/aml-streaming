version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: aml-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: aml-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: redis:7-alpine
    container_name: aml-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: aml-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./init-clickhouse.sql:/docker-entrypoint-initdb.d/init-clickhouse.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  hbase:
    image: harisekhon/hbase:2.5
    container_name: aml-hbase
    ports:
      - "16010:16010"
      - "16020:16020"
    environment:
      HBASE_ZOOKEEPER_QUORUM: zookeeper

  hive:
    image: apache/hive:3.1.3
    container_name: aml-hive
    ports:
      - "10000:10000"
      - "9083:9083"
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:derby:;databaseName=/opt/hive/metastore/metastore_db;create=true"
      SERVICE_NAME: "metastore"

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
