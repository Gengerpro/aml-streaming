aml {
  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    group-id = "aml-streaming-group"
    group-id = ${?KAFKA_GROUP_ID}
    schema-registry-url = "http://localhost:8081"
    schema-registry-url = ${?SCHEMA_REGISTRY_URL}
  }
  hbase {
    zookeeper-quorum = "localhost"
    zookeeper-quorum = ${?HBASE_ZOOKEEPER_QUORUM}
    zookeeper-port = 2181
    zookeeper-port = ${?HBASE_ZOOKEEPER_PORT}
    table-name = "aml_transactions"
    table-name = ${?HBASE_TABLE_NAME}
  }
  clickhouse {
    jdbc-url = "jdbc:clickhouse://localhost:8123/aml"
    jdbc-url = ${?CLICKHOUSE_JDBC_URL}
    username = "default"
    username = ${?CLICKHOUSE_USERNAME}
    password = ""
    password = ${?CLICKHOUSE_PASSWORD}
    database = "aml"
    database = ${?CLICKHOUSE_DATABASE}
  }
  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    db = 0
    db = ${?REDIS_DB}
  }
  hive {
    metastore-uris = "thrift://localhost:9083"
    metastore-uris = ${?HIVE_METASTORE_URIS}
    warehouse-dir = "/warehouse/aml"
    warehouse-dir = ${?HIVE_WAREHOUSE_DIR}
  }
  checkpoint {
    base-path = "/tmp/checkpoint"
    base-path = ${?CHECKPOINT_BASE_PATH}
  }
  rule-engine {
    rule-store-path = "/aml/rules"
    rule-store-path = ${?RULE_STORE_PATH}
    refresh-interval-seconds = 60
    refresh-interval-seconds = ${?RULE_REFRESH_INTERVAL}
    ctr-threshold = 10000
    ctr-threshold = ${?CTR_THRESHOLD}
    high-risk-countries = ["IR", "KP", "SY", "CU"]
    high-risk-countries = ${?HIGH_RISK_COUNTRIES}
    sanctions-list-path = "/aml/sanctions/sdn.csv"
    sanctions-list-path = ${?SANCTIONS_LIST_PATH}
  }
}
